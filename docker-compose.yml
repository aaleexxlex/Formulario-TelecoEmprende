services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telecoemprende
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: telecoemprende
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:?set in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set in .env}
      - DATABASE_URL=postgresql://telecoemprende:${POSTGRES_PASSWORD}@db:5432/telecoemprende
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  certbot-webroot:
  certbot-certs:
